name: Build Flutter APK from ZIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo files
        run: |
          ls -la

      - name: Unzip project
        run: |
          rm -rf extracted project
          mkdir extracted project

          unzip -o "營養標示.zip" -d extracted

          echo "=== ZIP content ==="
          find extracted -maxdepth 4 -type f | head -200

          PUBSPEC_DIR=$(find extracted -name pubspec.yaml -exec dirname {} \; | head -n 1)

          if [ -z "$PUBSPEC_DIR" ]; then
            echo "找不到 pubspec.yaml，這個 ZIP 可能不是 Flutter 專案"
            exit 1
          fi

          echo "Flutter project found at: $PUBSPEC_DIR"

          shopt -s dotglob
          cp -r "$PUBSPEC_DIR"/* project/

          echo "=== Project files ==="
          ls -la project

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get Flutter dependencies
        working-directory: project
        run: flutter pub get

      - name: Create Android folder if missing
        working-directory: project
        run: |
          if [ ! -d android ]; then
            echo "android folder not found, creating Android project..."
            flutter create . --platforms=android --org com.lcym346.foodlabel
          else
            echo "android folder exists"
          fi

      - name: Build APK
        working-directory: project
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: food-label-release-apk
          path: project/build/app/outputs/flutter-apk/app-release.apk
