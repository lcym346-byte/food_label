plugins {
    id 'com.android.application'
}

android {
    namespace 'tw.foodlabel.pro'
    compileSdk 35

    defaultConfig {
        applicationId 'tw.foodlabel.pro'
        minSdk 21
        targetSdk 35
        versionCode 1
        versionName '1.0.0'
    }

    buildTypes {
        release {
            // 交付測試版使用 debug 簽章，GitHub Actions 可直接產出可安裝 APK；正式上架請改 release keystore。
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}
